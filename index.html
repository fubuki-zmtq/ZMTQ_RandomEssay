<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>ZMTQランダム作文</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans JP", sans-serif;
  background: linear-gradient(135deg, #eef2ff, #e0f2fe);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-sizing: border-box;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 540px;
  max-width: 90vw;
  text-align: center;
  transition: width 0.3s ease;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #6366f1;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
}

.hidden { display: none !important; }

.spinner {
  margin: 20px auto;
  width: 40px;
  height: 40px;
  border: 5px solid #ddd;
  border-top: 5px solid #6366f1;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.result { cursor: pointer; margin-top: 10px; font-size: 18px; }
.note { font-size: 12px; color: gray; }
.rare { margin-top: 10px; font-weight: bold; }

.ultra { color: gold; }
.hyper { color: red; }
.super { color: purple; }
.rare1 { color: blue; }

.daikichi { color: gold; }
.chukichi { color: green; }
.shokichi { color: orange; }
.kyo { color: purple; }
.special { color: #38bdf8; }

.log-trigger {
  font-size: 12px;
  color: gray;
  cursor: pointer;
  text-decoration: underline;
  transition: 0.2s;
}
.log-trigger:hover { color: #6366f1; }

.menu-btn {
  background: #f1f5f9;
  color: #475569;
  font-size: 12px;
  padding: 6px 16px;
  border-radius: 6px;
  border: 1px solid #cbd5e1;
  margin-top: 5px;
  transition: 0.2s;
}
.menu-btn:hover { background: #e2e8f0; transform: translateY(-2px); }

/* トグルスイッチのスタイル */
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #cbd5e1;
  transition: .4s;
  border-radius: 24px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}
input:checked + .slider {
  background-color: #10b981;
}
input:checked + .slider:before {
  transform: translateX(20px);
}

/* 通知と実績の基本設定（PC・スマホ共通） */
.achievement {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  pointer-events: none;
  font-size: 14px;
  z-index: 3000;
}
.achievement.show { opacity: 1; transform: translateY(0); }

.log-notification {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(99, 102, 241, 0.95);
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  pointer-events: none;
  font-size: 13px;
  z-index: 3000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.log-notification.show { opacity: 1; transform: translateY(0); }

/* スマホ向けのレイアウト調整（位置だけを上書き） */
@media (max-width: 600px) {
  body { padding: 10px; height: auto; }
  .card { width: 100%; padding: 25px; }
  h1 { font-size: 20px; }
  .result { font-size: 16px; }
  button { width: 100%; margin-top: 12px; }

  .achievement {
    right: auto;
    left: 50%;
    bottom: 20px;
    transform: translate(-50%, 20px);
    white-space: nowrap;
  }
  .achievement.show {
    transform: translate(-50%, 0);
  }

  .log-notification {
    left: 50%;
    bottom: auto;
    top: 20px;
    transform: translate(-50%, -20px);
    white-space: nowrap;
  }
  .log-notification.show {
    transform: translate(-50%, 0);
  }
}

/* モーダルの背景 */
.logModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  opacity: 0;
  animation: bgFadeIn 0.3s forwards;
}

@keyframes bgFadeIn { to { opacity: 1; } }

/* モーダル枠 */
.logBox {
  position: relative;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-sizing: border-box;
  max-width: 90vw;
  overflow-y: auto;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  transform: scale(0.9);
  opacity: 0;
  animation: smoothIn 0.25s ease-out forwards;
}

@keyframes smoothIn { to { transform: scale(1); opacity: 1; } }

.log-box-style { width: 450px; max-height: 70vh; }
.quiz-box-style { width: 580px; max-height: 85vh; }

.outer-close-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: rgba(255, 255, 255, 0.2);
  color: white;
  line-height: 44px;
  text-align: center;
  font-size: 24px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.3s;
  user-select: none;
  z-index: 2100;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.3);
}
.outer-close-btn:hover {
  background: rgba(239, 68, 68, 0.8);
  transform: rotate(90deg);
}

/* ツールチップ（吹き出し）関連 */
.ach-item {
  position: relative;
  padding: 8px 0;
  color: #333;
  font-weight: bold;
  border-bottom: 1px dashed #e2e8f0;
  cursor: help;
  display: inline-block;
  width: 100%;
}
.ach-item-locked {
  padding: 8px 0;
  color: #94a3b8;
  border-bottom: 1px dashed #e2e8f0;
}
.tooltip {
  visibility: hidden;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  z-index: 4000;
  opacity: 0;
  transition: opacity 0.2s;
  margin-bottom: 5px;
  pointer-events: none;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.tooltip::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  margin-left: -5px;
  border-width: 5px;
  border-style: solid;
  border-color: #333 transparent transparent transparent;
}
.ach-item:hover .tooltip, .ach-item:active .tooltip {
  visibility: visible;
  opacity: 1;
}

/* クイズ用のスタイル */
.quiz-option {
  display: block; width: 100%; box-sizing: border-box;
  margin: 10px 0; padding: 14px 18px;
  background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px;
  cursor: pointer; transition: all 0.2s ease; text-align: left; font-size: 15px; color: #333;
}
.quiz-option:hover { background: #eef2ff; border-color: #6366f1; transform: translateX(5px); }

.quiz-result-title {
  font-size: 28px; font-weight: bold;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.fade-transition { animation: simpleFade 0.3s ease forwards; }
@keyframes simpleFade {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

</style>
</head>
<body>

<div id="home" class="card fade-transition">
  <h1>ZMTQランダム作文</h1>
  <p>「いつ・どこで・誰が・何をした」をランダムに組み合わせて生成します</p>
  
  <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
    <button onclick="start()">生成する</button>
    <button onclick="openFortune()" style="background:#64748b;">今日の運勢を見る</button>
  </div>
  <button onclick="openQuiz()" style="background:#10b981; margin-top:15px; width:100%;">ZMTQuizに挑戦する</button>
  
  <div style="margin-top: 25px; padding: 15px; background: #f8fafc; border-radius: 10px; display: flex; align-items: center; justify-content: space-between;">
    <div style="text-align: left;">
      <div style="font-size: 14px; font-weight: bold; color: #334155;">ネタバレ防止モード</div>
      <div style="font-size: 11px; color: #64748b; margin-top: 2px;">物語の核心に関わる単語を非表示にします</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="spoilerToggle" onchange="handleSpoilerToggle(this)">
      <span class="slider"></span>
    </label>
  </div>

  <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
    <div class="log-trigger" onclick="openLog()">ログを確認する</div>
    <div class="log-trigger" onclick="openAchievements()">解除した実績</div>
  </div>
  
  <div style="border-top: 1px solid #e2e8f0; margin-top: 20px; padding-top: 15px;">
    <button class="menu-btn" onclick="openNews()">更新情報</button>
  </div>
</div>

<div id="loading" class="card hidden">
  <p>生成中…</p>
  <div class="spinner"></div>
</div>

<div id="result" class="card hidden fade-transition">
  <h2>生成結果</h2>
  <div class="note">※クリック / タップでコピーできます</div>
  <div id="text" class="result" onclick="copyText()"></div>
  <div id="rarity" class="rare"></div>
  <button onclick="backHome()">もう一度</button>
</div>

<div id="fortune" class="card hidden fade-transition">
  <h2>ZMTQ占い</h2>
  <div id="fortuneTitle" style="font-size:28px; font-weight:bold;"></div>
  <div id="fortuneMsg" class="note" style="margin-top:10px;"></div>
  <button onclick="backHome()">戻る</button>
</div>

<div id="logModal" class="logModal hidden">
  <div class="outer-close-btn" onclick="closeModal('logModal')">✕</div>
  <div class="logBox log-box-style">
    <h3 style="margin-top:0;">観測ログ</h3>
    <div id="logContent" style="font-size:14px; line-height:1.6; text-align:left;"></div>
  </div>
</div>

<div id="achievementsModal" class="logModal hidden">
  <div class="outer-close-btn" onclick="closeModal('achievementsModal')">✕</div>
  <div class="logBox log-box-style">
    <h3 style="margin-top:0;">実績一覧</h3>
    <div id="achievementsContent" style="font-size:14px; line-height:1.6; text-align:left;"></div>
  </div>
</div>

<div id="newsModal" class="logModal hidden">
  <div class="outer-close-btn" onclick="closeModal('newsModal')">✕</div>
  <div class="logBox log-box-style">
    <h3 style="margin-top:0; color:#64748b;">更新情報</h3>
    <div id="newsContent" style="font-size:14px; line-height:1.6; text-align:left;"></div>
  </div>
</div>

<div id="spoilerConfirmModal" class="logModal hidden">
  <div class="logBox log-box-style" style="width: 320px; text-align: center;">
    <h3 style="margin-top:0; color:#ef4444;">モード切替の確認</h3>
    <p id="spoilerConfirmMsg" style="font-size: 14px; color: #333; margin-bottom: 25px; line-height: 1.6;"></p>
    <div style="display: flex; gap: 10px;">
      <button id="spoilerConfirmBtn" style="flex: 1; margin: 0; background: #ef4444;">切り替える</button>
      <button onclick="cancelSpoilerToggle()" style="flex: 1; margin: 0; background: #94a3b8;">キャンセル</button>
    </div>
  </div>
</div>

<div id="quizModal" class="logModal hidden">
  <div class="outer-close-btn" id="quizCloseBtn" onclick="closeModal('quizModal')">✕</div>
  <div class="logBox quiz-box-style" id="quizBox">
    <div id="quizQuestionArea">
      <h3 id="quizTitle" style="margin-top:0; color:#6366f1;"></h3>
      <div id="quizOptions"></div>
    </div>
    <div id="quizTransitionArea" class="hidden fade-transition" style="text-align: center; padding: 30px 0;">
      <h2>お疲れさまでした！</h2>
      <p class="note">結果を集計中…</p>
    </div>
    <div id="quizResultArea" class="hidden fade-transition" style="text-align: center;">
      <div class="quiz-result-title">クイズ結果</div>
      <p style="font-size: 16px; margin: 25px 0;">あなたの正答数は<br><span id="quizScoreDisplay" style="font-size: 32px; color: #10b981; font-weight:bold;"></span> <span style="font-size:18px;">問 / 5問中</span></p>
      <button onclick="closeModal('quizModal')" style="width:100%;">ホームに戻る</button>
    </div>
  </div>
</div>

<div id="achievement" class="achievement"></div>
<div id="logNotification" class="log-notification">📝 ログに記録されました</div>

<script>
// ==========================================
// 🔧 カスタマイズエリア：更新情報の追加
// ==========================================
const updateNewsList = [
  { date: "2026/04/28", text: "初見の方でも安心して遊べるように「ネタバレ防止モード」を追加しました。" },
  { date: "2026/04/28", text: "単語の追加と、新しい特殊実績を実装しました。ぜひ集めてみてください！" },
  { date: "2026/04/28", text: "実績の追加、実績画面での達成条件表示、ログ通知機能、更新情報ページを実装しました。" },
  { date: "2026/04/27", text: "ZMTQuizを実装しました。全問正解を目指してみてください！" },
  { date: "2026/04/27", text: "ZMTQランダム作文アプリを公開しました。" }
];

// ==========================================
// 🔧 カスタマイズエリア：単語の追加
// ==========================================
const normal = {
  when: [
    "今日","さっき","昨日","一週間前","三か月前","一年前","十年前","千年前","だいぶ前","いつか分からんけど"
  ],
  where: [
    "バネッサで","妖精国で","氷河坑道連邦で","獣の国で","世界樹図書館で","東の国で","華都で","ニライカナイで","吸血鬼城で","魔王領で","教団市国で","蒼い月の裏側で","その辺で"
  ],
  who: [
    "勇者が","古代勇者が","魔王軍が","魔王軍四天王が","妖精が","魔導士が","騎士が","獣人が","商人が","賢者が","戦士が","神官が","壱ノ護王が","弐ノ護王が","參ノ護王が","肆ノ護王が","神王グゴールが","その辺の人が",
    "学者が"
  ],
  what: [
    "魔法の練習をした","ピクニックをした","お昼寝した","パーティーをした","爆発した","転んだ","歌い出した","踊り出した","迷言を言った","お団子を食べた","猛勉強した","記憶を取り戻した","武器を買った","扉をぶち壊した","猫耳メイドになった",
    "現界した"
  ]
};

const rare = {
  when: ["人類が滅ぶ前"],
  where: ["僕らだけの世界で"],
  who: ["護王全員が"],
  what: ["タイピングで競った"]
};

// ==========================================
// 🔧 カスタマイズエリア：実績の定義
// ==========================================
const ALL_ACHIEVEMENTS = {
  "生成": [
    { name: "ランダム作文ビギナー", desc: "ランダム作文を初めて生成した" },
    { name: "ランダム作文常連", desc: "ランダム作文を10回生成した" },
    { name: "ランダム作文マスター", desc: "ランダム作文を100回生成した" }
  ],
  "レアリティ": [
    { name: "ラッキーパーソン", desc: "レアを引いた" },
    { name: "能力：運が高い", desc: "スーパーレアを引いた" },
    { name: "幸運の申し子", desc: "ハイパーレアを引いた" },
    { name: "豪運の魔道士", desc: "ウルトラレアを引いた" }
  ],
  "占い": [
    { name: "占い初心者", desc: "初めて占った" },
    { name: "占い常連", desc: "10回占った" },
    { name: "なんで私が占いに！？", desc: "フブ吉を引いた" },
    { name: "祝・魔王軍襲来", desc: "大凶を引いた" }
  ],
  "クイズ": [
    { name: "ZMTQ博士", desc: "ZMTQuizに全問正解した" }
  ],
  "特殊・ログ": [
    { name: "名もなき記録者", desc: "初めてログが記録された" },
    { name: "常世の記録者", desc: "ログに10回記録された" },
    { name: "ハッピーライフキング", desc: "楽しげな雰囲気の神王グゴールを観測した" },
    { name: "護王も歩けば転ぶ", desc: "護王が転んだ" },
    { name: "芸術は爆発だ！", desc: "爆発を10回検知した" },
    { name: "#世界を猫耳メイドで埋め尽くそう", desc: "猫耳メイドを10回検知した" },
    { name: "何やっとんじゃこの筋肉達磨ァッ！！！！", desc: "筋肉達磨によって氷河坑道連邦が破壊された" },
    { name: "それどころではない", desc: "勇者か魔王軍四天王が蒼い月で呑気にしていた" },
    { name: "僕らだけのハッピーエンド？", desc: "神王グゴールが爆発した" },
    { name: "僕らだけの冒険を", desc: "千年前の古代勇者を発見した" },
    { name: "僕らだけのパーリナイ", desc: "楽しげな雰囲気を10回感知した" },
    { name: "僕らだけのカチコミを", desc: "勇者が扉をぶち壊した" },
    { name: "Why危機？", desc: "泥酔の賢者を確認した" },
    { name: "古代勇者の本気", desc: "古代勇者が現界した" },
    { name: "命源揺蕩ウ流厳ノ水妃・ウンディーネ", desc: "水の原初精霊を感知した" },
    { name: "終告ゲル絶望ノ皇氷・カリアッハヴェーラ", desc: "氷の原初精霊を感知した" },
    { name: "世ヲ融カス神殺ノ青・カーラクータ", desc: "毒の原初精霊を感知した" }
  ],
  "コンプリート": [
    { name: "実績コレクター", desc: "実績を50％以上解除した" },
    { name: "実績エキスパート", desc: "実績を75％以上解除した" },
    { name: "世界の理を知る者", desc: "コンプリート以外の全ての実績を解除した" }
  ]
};

// ==========================================
// 🔧 ネタバレとして扱う単語の定義
// ==========================================
const SPOILER_WORDS = [
  "蒼い月の裏側で",
  "神王グゴールが",
  "弐ノ護王が",
  "肆ノ護王が",
  "記憶を取り戻した",
  "現界した",
  "人類が滅ぶ前"
];

// ------------------------------------------------------------------
// 以下、システムの中核プログラムです
// ------------------------------------------------------------------

const VALID_CORE_ACHIEVEMENTS = new Set(
  Object.values(ALL_ACHIEVEMENTS)
    .filter((_, i, arr) => i !== arr.length - 1)
    .flat()
    .map(a => a.name)
);
const CORE_ACHIEVEMENT_COUNT = VALID_CORE_ACHIEVEMENTS.size;

let genCount = 0;
let fortuneCount = 0;
let partyCount = 0;
let explosionCount = 0;
let unlocked = new Set();
let logs = [];
let achievementQueue = [];
let isShowingAchievement = false;
let isSpoilerMode = false; // ネタバレ防止モードの状態

function loadData() {
  const saved = localStorage.getItem('zmtq_save_data');
  if (saved) {
    const data = JSON.parse(saved);
    genCount = data.genCount || 0;
    fortuneCount = data.fortuneCount || 0;
    partyCount = data.partyCount || 0;
    explosionCount = data.explosionCount || 0;
    logs = data.logs || [];
    unlocked = new Set(data.unlocked || []);
    isSpoilerMode = data.isSpoilerMode || false;
  }
  
  // トグルスイッチに状態を反映
  document.getElementById("spoilerToggle").checked = isSpoilerMode;
}

function saveData() {
  const data = {
    genCount, fortuneCount, partyCount, explosionCount,
    logs, unlocked: Array.from(unlocked),
    isSpoilerMode
  };
  localStorage.setItem('zmtq_save_data', JSON.stringify(data));
}

window.onload = loadData;

let rareCount = 0;

function pick(type) {
  let pool = normal[type];
  let isRarePicked = false;

  if (Math.random() < 0.05) {
    pool = rare[type];
    isRarePicked = true;
  }

  // ネタバレ防止モードがオンの時の除外処理
  if (isSpoilerMode) {
    let safePool = pool.filter(word => !SPOILER_WORDS.includes(word));
    // レア枠が除外されて空っぽになってしまった場合は、通常枠から選び直す
    if (safePool.length === 0) {
      safePool = normal[type].filter(word => !SPOILER_WORDS.includes(word));
      isRarePicked = false;
    }
    pool = safePool;
  }

  if (isRarePicked) {
    rareCount++;
  }
  
  return pool[Math.floor(Math.random() * pool.length)];
}

// ネタバレ防止モードのUI制御
function handleSpoilerToggle(checkbox) {
  const wantToTurnOn = checkbox.checked;
  // 確認が終わるまでは見た目を元に戻す
  checkbox.checked = !wantToTurnOn;

  const msgEl = document.getElementById("spoilerConfirmMsg");
  const btnEl = document.getElementById("spoilerConfirmBtn");

  if (wantToTurnOn) {
    msgEl.innerText = "ネタバレ防止モードをオンにします。このモードをオンにすると一部の実績が達成できなくなりますがよろしいですか？";
    btnEl.innerText = "オンにする";
    btnEl.style.background = "#10b981";
    btnEl.onclick = () => confirmSpoilerToggle(true);
  } else {
    msgEl.innerText = "ネタバレ防止モードをオフにします。よろしいですか？";
    btnEl.innerText = "オフにする";
    btnEl.style.background = "#ef4444";
    btnEl.onclick = () => confirmSpoilerToggle(false);
  }
  
  document.getElementById("spoilerConfirmModal").classList.remove("hidden");
}

function confirmSpoilerToggle(turnOn) {
  isSpoilerMode = turnOn;
  document.getElementById("spoilerToggle").checked = turnOn;
  saveData();
  closeModal('spoilerConfirmModal');
}

function cancelSpoilerToggle() {
  closeModal('spoilerConfirmModal');
}

function generate() {
  rareCount = 0;
  const current = { when: pick("when"), where: pick("where"), who: pick("who"), what: pick("what") };
  updateText(current);
  genCount++;

  if (genCount >= 1) unlock("ランダム作文ビギナー");
  if (genCount >= 10) unlock("ランダム作文常連");
  if (genCount >= 100) unlock("ランダム作文マスター");

  if (rareCount === 1) unlock("ラッキーパーソン");
  if (rareCount === 2) unlock("能力：運が高い");
  if (rareCount === 3) unlock("幸運の申し子");
  if (rareCount >= 4) unlock("豪運の魔道士");

  if (current.when.includes("千年前")) addLog("古き時代を感知");  
  if (current.where.includes("月")) addLog("異常領域：月面反応あり");
  if (current.who.includes("勇者")) addLog("勇者を確認");
  if (current.who.includes("護王")) addLog("種族の長を確認");
  if (current.who.includes("神王グゴール")) addLog("神？を確認");
  if (current.what.includes("お団子")) addLog("お団子摂取済み");
  if (current.what.includes("記憶")) addLog("記憶の断片を検知");
  if (current.what.includes("扉をぶち壊した")) addLog("扉の破片を検知");
  
  if (current.what.includes("爆発")) {
    addLog("爆発を検知");
    explosionCount++;
    if (explosionCount >= 10) unlock("芸術は爆発だ！");
  }

  if (current.what.includes("猫耳メイド")) {
    addLog("猫耳メイドを検知");
    explosionCount++;
    if (explosionCount >= 10) unlock("#世界を猫耳メイドで埋め尽くそう");
  }
  
  const isPartyWhat = current.what.includes("歌い出した") || current.what.includes("踊り出した") || current.what.includes("パーティーをした");
  if (isPartyWhat) {
    addLog("楽しげな雰囲気を感知");
    partyCount++;
    if (partyCount >= 10) unlock("僕らだけのパーリナイ");
  }

  if (current.when.includes("千年前") && current.who.includes("古代勇者")) {
    addLog("伝説の旅を検出");
    unlock("僕らだけの冒険を");
  }
  if (current.who.includes("神王グゴール") && current.what.includes("爆発した")) {
    addLog("神王爆破により物語終了");
    unlock("僕らだけのハッピーエンド？");
  }
  if (current.who.includes("神王グゴール") && isPartyWhat) {
    unlock("ハッピーライフキング");
  }
  if (current.who.includes("護王") && current.what.includes("転んだ")) {
    unlock("護王も歩けば転ぶ");
  }
  
  const isSoreWho = current.who.includes("古代勇者") || current.who.includes("戦士");
  const isSoreWhat = isPartyWhat || current.what.includes("爆発した") || current.what.includes("扉をぶち壊した");
  if (current.where.includes("氷河坑道連邦") && isSoreWho && isSoreWhat) {
    addLog("氷河坑道の破壊を検知");
    unlock("何やっとんじゃこの筋肉達磨ァッ！！！！");
  }
  
  const isSoreWho = current.who.includes("勇者") || current.who.includes("魔王軍四天王");
  const isSoreWhat = isPartyWhat || current.what.includes("お昼寝した") || current.what.includes("ピクニックをした") || current.what.includes("お団子を食べた") || current.what.includes("タイピングで競った");
  if (current.where.includes("蒼い月の裏側") && isSoreWho && isSoreWhat) {
    unlock("それどころではない");
  }
  if (current.who === "勇者が" && current.what.includes("扉をぶち壊した")) {
    unlock("僕らだけのカチコミを");
  }
  
  if (current.who.includes("參ノ護王") && current.what.includes("お団子を食べた")) {
    addLog("魔王の主食を検出");
  }

  if (current.who.includes("賢者") && current.what.includes("迷言を言った")) {
    addLog("泥酔の賢者を確認");
    unlock("Why危機？");
  }

  if (current.who.includes("古代勇者") && current.what.includes("現界した")) {
    addLog("古代勇者の現界を感知");
    unlock("古代勇者の本気");
    
    if (current.where.includes("妖精国")) {
      unlock("命源揺蕩ウ流厳ノ水妃・ウンディーネ");
    }
    if (current.where.includes("氷河坑道連邦")) {
      unlock("終告ゲル絶望ノ皇氷・カリアッハヴェーラ");
    }
  }

  if (current.where.includes("世界樹図書館") && current.who.includes("学者") && current.what.includes("現界した")) {
    unlock("世ヲ融カス神殺ノ青・カーラクータ");
  }

  saveData();
}

function updateText(current) {
  document.getElementById("text").innerText = `${current.when}、${current.where}${current.who}${current.what}`;
  const r = document.getElementById("rarity");
  r.className = "rare";
  if (rareCount === 1) { r.innerText = "レア！"; r.classList.add("rare1"); }
  else if (rareCount === 2) { r.innerText = "スーパーレア！"; r.classList.add("super"); }
  else if (rareCount === 3) { r.innerText = "ハイパーレア！"; r.classList.add("hyper"); }
  else if (rareCount >= 4) { r.innerText = "ウルトラレア！！"; r.classList.add("ultra"); }
  else { r.innerText = ""; }
}

function start() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");
  setTimeout(() => {
    generate();
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
  }, 1500);
}

function copyText() {
  navigator.clipboard.writeText(document.getElementById("text").innerText);
  alert("コピーしたよ！");
}

function backHome() {
  document.getElementById("fortune").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function unlock(name) {
  if (unlocked.has(name)) return;
  unlocked.add(name);
  saveData();

  checkCompletion();

  achievementQueue.push(name);
  showNextAchievement();
}

function showNextAchievement() {
  if (isShowingAchievement || achievementQueue.length === 0) return;
  isShowingAchievement = true;
  
  const name = achievementQueue.shift();
  const el = document.getElementById("achievement");
  el.innerText = `🏆 実績解除：${name}`;
  el.classList.add("show");
  
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => {
      isShowingAchievement = false;
      showNextAchievement();
    }, 400); 
  }, 2500);
}

function checkCompletion() {
  let currentCoreCount = 0;
  for(let item of unlocked) {
    if(VALID_CORE_ACHIEVEMENTS.has(item)) {
      currentCoreCount++;
    }
  }
  const ratio = currentCoreCount / CORE_ACHIEVEMENT_COUNT;
  
  if (ratio >= 0.5 && !unlocked.has("実績コレクター")) unlock("実績コレクター");
  if (ratio >= 0.75 && !unlocked.has("実績エキスパート")) unlock("実績エキスパート");
  if (ratio >= 1.0 && !unlocked.has("世界の理を知る者")) unlock("世界の理を知る者");
}

function addLog(text) {
  logs.push(text);
  
  const notice = document.getElementById("logNotification");
  notice.classList.add("show");
  setTimeout(() => { notice.classList.remove("show"); }, 2000);
  
  if (logs.length >= 1 && !unlocked.has("名もなき記録者")) unlock("名もなき記録者");
  if (logs.length >= 10 && !unlocked.has("常世の記録者")) unlock("常世の記録者");
  
  saveData();
}

function closeModal(id) {
  document.getElementById(id).classList.add("hidden");
}

function openLog() {
  const box = document.getElementById("logContent");
  box.innerHTML = logs.length ? logs.map(l => `<div style="border-bottom:1px dashed #e2e8f0; padding:8px 0;">・${l}</div>`).join("") : "ログはまだ記録されていません";
  document.getElementById("logModal").classList.remove("hidden");
}

function openAchievements() {
  const box = document.getElementById("achievementsContent");
  
  let currentCoreCount = 0;
  for(let item of unlocked) {
    if(VALID_CORE_ACHIEVEMENTS.has(item)) {
      currentCoreCount++;
    }
  }
  
  const progressPercent = Math.floor((currentCoreCount / CORE_ACHIEVEMENT_COUNT) * 100);
  
  let html = `<div style="text-align:center; font-size:16px; font-weight:bold; color:#10b981; margin-bottom:15px;">達成率: ${progressPercent}%</div>`;

  for (const [category, achList] of Object.entries(ALL_ACHIEVEMENTS)) {
    html += `<h4 style="margin: 15px 0 5px 0; color: #6366f1; border-bottom: 2px solid #e2e8f0; padding-bottom: 3px;">【${category}】</h4>`;
    achList.forEach(ach => {
      if (unlocked.has(ach.name)) {
        html += `<div class="ach-item">🏆 ${ach.name}<span class="tooltip">${ach.desc}</span></div>`;
      } else {
        html += `<div class="ach-item-locked">🔒 ？？？</div>`;
      }
    });
  }
  box.innerHTML = html;
  document.getElementById("achievementsModal").classList.remove("hidden");
}

function openNews() {
  const box = document.getElementById("newsContent");
  box.innerHTML = updateNewsList.map(n => `
    <div style="margin-bottom:15px; border-bottom:1px dashed #e2e8f0; padding-bottom:10px;">
      <div style="font-weight:bold; color:#64748b; font-size:12px; margin-bottom:4px;">${n.date}</div>
      <div>${n.text.replace(/\n/g, '<br>')}</div>
    </div>
  `).join("");
  document.getElementById("newsModal").classList.remove("hidden");
}

function openFortune() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("fortune").classList.remove("hidden");
  const title = document.getElementById("fortuneTitle"), msg = document.getElementById("fortuneMsg");
  title.className = "";

  }

let currentQuizIndex = 0, currentScore = 0;

function openQuiz() {
  currentQuizIndex = 0; currentScore = 0;
  document.getElementById("quizQuestionArea").classList.remove("hidden");
  document.getElementById("quizTransitionArea").classList.add("hidden");
  document.getElementById("quizResultArea").classList.add("hidden");
  document.getElementById("quizCloseBtn").classList.remove("hidden");
  renderQuestion();
  document.getElementById("quizModal").classList.remove("hidden");
}

function renderQuestion() {
  const data = quizData[currentQuizIndex];
  const title = document.getElementById("quizTitle"), optionsBox = document.getElementById("quizOptions");
  
  title.classList.remove("fade-transition"); optionsBox.classList.remove("fade-transition");
  void title.offsetWidth; 
  title.classList.add("fade-transition"); optionsBox.classList.add("fade-transition");

  title.innerText = data.q; optionsBox.innerHTML = "";
  data.opts.forEach((optText, index) => {
    const btn = document.createElement("div");
    btn.className = "quiz-option"; btn.innerText = optText;
    btn.onclick = () => handleAnswer(index);
    optionsBox.appendChild(btn);
  });
}

function handleAnswer(selectedIndex) {
  if (selectedIndex === quizData[currentQuizIndex].ans) currentScore++;
  currentQuizIndex++;
  currentQuizIndex < quizData.length ? renderQuestion() : finishQuiz();
}

function finishQuiz() {
  document.getElementById("quizQuestionArea").classList.add("hidden");
  const transArea = document.getElementById("quizTransitionArea");
  transArea.classList.remove("hidden");
  document.getElementById("quizCloseBtn").classList.add("hidden");

  setTimeout(() => {
    transArea.classList.add("hidden");
    document.getElementById("quizScoreDisplay").innerText = currentScore;
    document.getElementById("quizResultArea").classList.remove("hidden");
    if(currentScore === 5) unlock("ZMTQ博士");
  }, 1500);
}
