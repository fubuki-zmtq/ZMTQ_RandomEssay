<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>ZMTQランダム作文</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans JP", sans-serif;
  background: linear-gradient(135deg, #eef2ff, #e0f2fe);
  display: flex;
  flex-direction: column; /* 要素を縦に並べる */
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 360px;
  max-width: 90vw;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #6366f1;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
}

.hidden { display: none !important; }

.spinner {
  margin: 20px auto;
  width: 40px;
  height: 40px;
  border: 5px solid #ddd;
  border-top: 5px solid #6366f1;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.result {
  cursor: pointer;
  margin-top: 10px;
  font-size: 18px;
}

.note {
  font-size: 12px;
  color: gray;
}

.rare { margin-top: 10px; font-weight: bold; }

.ultra { color: gold; }
.hyper { color: red; }
.super { color: purple; }
.rare1 { color: blue; }

.daikichi { color: gold; }
.chukichi { color: green; }
.shokichi { color: orange; }
.kyo { color: purple; }
.special { color: #38bdf8; }

/* ログ確認ボタンのスタイル */
.log-trigger {
  margin-top: 20px;
  font-size: 12px;
  color: gray;
  cursor: pointer;
  text-decoration: underline;
}

@media (max-width: 600px) {
  body { padding: 10px; height: auto; }
  .card { width: 100%; padding: 25px; }
  h1 { font-size: 22px; }
  .result { font-size: 16px; }
  button { width: 100%; margin-top: 12px; }
}

.achievement {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  pointer-events: none;
  font-size: 14px;
  z-index: 1000;
}

.achievement.show { opacity: 1; transform: translateY(0); }

.logModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.logBox {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
}
</style>
</head>
<body>

<div id="home" class="card">
  <h1>ZMTQランダム作文</h1>
  <p>「いつ・どこで・誰が・何をした」をランダム生成</p>
  <button onclick="start()">生成する</button>
  <button onclick="openFortune()" style="background:#64748b;">今日の運勢を見る</button>
</div>

<div id="loading" class="card hidden">
  <p>生成中…</p>
  <div class="spinner"></div>
</div>

<div id="result" class="card hidden">
  <h2>生成結果</h2>
  <div class="note">※クリック / タップでコピーできます</div>
  <div id="text" class="result" onclick="copyText()"></div>
  <div id="rarity" class="rare"></div>
  <button onclick="backHome()">もう一度</button>
</div>

<div id="fortune" class="card hidden">
  <h2>ZMTQ占い</h2>
  <div id="fortuneTitle" style="font-size:28px; font-weight:bold;"></div>
  <div id="fortuneMsg" class="note" style="margin-top:10px;"></div>
  <button onclick="backHome()">戻る</button>
</div>

<div class="log-trigger" onclick="openLog()">ログを確認する</div>

<div id="logModal" class="logModal hidden">
  <div class="logBox">
    <h3>観測ログ</h3>
    <div id="logContent"></div>
    <button onclick="closeLog()" style="width:100%;">閉じる</button>
  </div>
</div>

<div id="achievement" class="achievement"></div>

<script>
// 状態管理
let genCount = 0;
let fortuneCount = 0;
let unlocked = new Set();
let logs = [];

// セーブデータの読み込み
function loadData() {
  const saved = localStorage.getItem('zmtq_save_data');
  if (saved) {
    const data = JSON.parse(saved);
    genCount = data.genCount || 0;
    fortuneCount = data.fortuneCount || 0;
    logs = data.logs || [];
    unlocked = new Set(data.unlocked || []);
  }
}

// セーブデータの保存
function saveData() {
  const data = {
    genCount,
    fortuneCount,
    logs,
    unlocked: Array.from(unlocked)
  };
  localStorage.setItem('zmtq_save_data', JSON.stringify(data));
}

window.onload = loadData;

const normal = {
  when: ["今日","さっき","昨日","一週間前","三か月前","一年前","十年前","千年前","だいぶ前","いつか分からんけど"],
  where: ["バネッサで","妖精国で","氷河坑道連邦で","獣の国で","世界樹図書館で","東の国で","華都で","ニライカナイで","吸血鬼城で","魔王領で","教団市国で","蒼い月の裏側で","その辺で"],
  who: ["勇者が","古代勇者が","魔王軍が","魔王軍四天王が","妖精が","魔導士が","騎士が","獣人が","商人が","神官が","壱ノ護王が","弐ノ護王が","參ノ護王が","肆ノ護王が","神王グゴールが","その辺の人が"],
  what: ["魔法の練習をした","ピクニックをした","お昼寝した","パーティーをした","爆発した","転んだ","歌い出した","踊り出した","迷言を言った","お団子を食べた","猛勉強した","記憶を取り戻した","武器を買った","扉をぶち壊した"]
};

const rare = {
  when: ["人類が滅ぶ前"],
  where: ["僕らだけの世界で"],
  who: ["護王全員が"],
  what: ["タイピングで競った"]
};

let rareCount = 0;

function pick(type) {
  if (Math.random() < 0.05) {
    rareCount++;
    return rare[type][0];
  }
  return normal[type][Math.floor(Math.random() * normal[type].length)];
}

function generate() {
  rareCount = 0;
  const current = {
    when: pick("when"),
    where: pick("where"),
    who: pick("who"),
    what: pick("what")
  };
  updateText(current);
  genCount++;

  // 実績チェック
  if (genCount >= 1) unlock("初めて生成した");
  if (genCount >= 10) unlock("10回生成した");
  if (genCount >= 100) unlock("100回生成した");

  if (rareCount === 1) unlock("レアを引いた");
  if (rareCount === 2) unlock("スーパーレアを引いた");
  if (rareCount === 3) unlock("ハイパーレアを引いた");
  if (rareCount >= 4) unlock("ウルトラレアを引いた");

  // ログチェック
  // when (いつ) をチェック
  if (current.when.includes("千年前")) addLog("古き時代を感知");  
  // where（どこで）をチェック
  if (current.where.includes("月")) addLog("異常領域：月面反応あり");
  // who (誰が) をチェック
  if (current.who.includes("勇者")) addLog("勇者を確認");
  if (current.who.includes("護王")) addLog("種族の長を確認");
  if (current.who.includes("神王グゴール")) addLog("神？を確認");
  // what（何をした）をチェック
  if (current.what.includes("爆発")) addLog("爆発を検知");
  if (current.what.includes("お団子")) addLog("お団子摂取済み");
  if (current.what.includes("記憶")) addLog("記憶の断片を検知");
  if (current.what.includes("パーティーをした") || current.what.includes("歌い出した") || current.what.includes("踊り出した")) {
  addLog("楽しげな雰囲気を感知");
  if (current.what.includes("扉をぶち壊した")) addLog("扉の破片を検知");
  }
    
  saveData();
}

function updateText(current) {
  const text = `${current.when}、${current.where}${current.who}${current.what}`;
  document.getElementById("text").innerText = text;
  const r = document.getElementById("rarity");
  r.className = "rare";
  if (rareCount === 1) { r.innerText = "レア！"; r.classList.add("rare1"); }
  else if (rareCount === 2) { r.innerText = "スーパーレア！"; r.classList.add("super"); }
  else if (rareCount === 3) { r.innerText = "ハイパーレア！"; r.classList.add("hyper"); }
  else if (rareCount >= 4) { r.innerText = "ウルトラレア！！"; r.classList.add("ultra"); }
  else { r.innerText = ""; }
}

function start() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");
  setTimeout(() => {
    generate();
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
  }, 1500);
}

function copyText() {
  const text = document.getElementById("text").innerText;
  navigator.clipboard.writeText(text);
  alert("コピーしたよ！");
}

const fortunes = {
  daikichi: { name: "大吉", class: "daikichi", msgs: ["理由は特にない", "魔法に目覚めるかも？", "今宵は星が綺麗でしょう"] },
  chukichi: { name: "中吉", class: "chukichi", msgs: ["空が青いから", "海が続いているから", "光魔法を浴びたい"] },
  shokichi: { name: "小吉", class: "shokichi", msgs: ["言いたいことは言おう", "おいしいご飯を食べよう", "たくさん寝よう"] },
  kyo: { name: "凶", class: "kyo", msgs: ["そんな日もあるさ", "魔防を高くしていこう", "ここから上がるしかない"] }
};

const specialFortune = [
  { name: "フブ吉", msg: "魔力の高い一日になるでしょう" },
  { name: "大凶", msg: "魔王軍の襲来に注意！" }
];

function openFortune() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("fortune").classList.remove("hidden");
  const title = document.getElementById("fortuneTitle");
  const msg = document.getElementById("fortuneMsg");
  title.className = "";

  if (Math.random() < 0.05) {
    const sp = specialFortune[Math.floor(Math.random() * specialFortune.length)];
    title.innerText = sp.name;
    msg.innerText = sp.msg;
    title.classList.add("special");
    if (sp.name === "フブ吉") unlock("フブ吉を引いた");
    if (sp.name === "大凶") unlock("大凶を引いた");
  } else {
    const keys = Object.keys(fortunes);
    const f = fortunes[keys[Math.floor(Math.random() * keys.length)]];
    title.innerText = f.name;
    msg.innerText = f.msgs[Math.floor(Math.random() * f.msgs.length)];
    title.classList.add(f.class);
  }

  fortuneCount++;
  if (fortuneCount >= 1) unlock("初めて占った");
  if (fortuneCount >= 10) unlock("10回占った");
  saveData();
}

function backHome() {
  document.getElementById("fortune").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function unlock(name) {
  if (unlocked.has(name)) return;
  unlocked.add(name);
  const el = document.getElementById("achievement");
  el.innerText = `🏆 実績解除：${name}`;
  el.classList.add("show");
  setTimeout(() => { el.classList.remove("show"); }, 2000);
  saveData();
}

function addLog(text) {
  logs.push(text);
  saveData();
}

function openLog() {
  document.getElementById("logModal").classList.remove("hidden");
  const box = document.getElementById("logContent");
  box.innerHTML = logs.length ? logs.map(l => `<div>・${l}</div>`).join("") : "ログはありません";
}

function closeLog() {
  document.getElementById("logModal").classList.add("hidden");
}
</script>
</body>
</html>
