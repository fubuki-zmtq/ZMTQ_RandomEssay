<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>ZMTQランダム作文</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans JP", sans-serif;
  background: linear-gradient(135deg, #eef2ff, #e0f2fe);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-sizing: border-box;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 540px;
  max-width: 90vw;
  text-align: center;
  transition: width 0.3s ease;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #6366f1;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
}

.hidden { display: none !important; }

.spinner {
  margin: 20px auto;
  width: 40px;
  height: 40px;
  border: 5px solid #ddd;
  border-top: 5px solid #6366f1;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.result {
  cursor: pointer;
  margin-top: 10px;
  font-size: 18px;
}

.note {
  font-size: 12px;
  color: gray;
}

.rare { margin-top: 10px; font-weight: bold; }

.ultra { color: gold; }
.hyper { color: red; }
.super { color: purple; }
.rare1 { color: blue; }

.daikichi { color: gold; }
.chukichi { color: green; }
.shokichi { color: orange; }
.kyo { color: purple; }
.special { color: #38bdf8; }

.log-trigger {
  font-size: 12px;
  color: gray;
  cursor: pointer;
  text-decoration: underline;
  transition: 0.2s;
}
.log-trigger:hover {
  color: #6366f1;
}

/* スマホ向けのレイアウト調整 */
@media (max-width: 600px) {
  body { padding: 10px; height: auto; }
  .card { width: 100%; padding: 25px; }
  h1 { font-size: 20px; }
  .result { font-size: 16px; }
  button { width: 100%; margin-top: 12px; }
}

.achievement {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  pointer-events: none;
  font-size: 14px;
  z-index: 3000; /* 全ての手前に表示するため数値を大きく */
}

.achievement.show { opacity: 1; transform: translateY(0); }

/* モーダルの背景 */
.logModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  opacity: 0;
  animation: bgFadeIn 0.3s forwards;
}

@keyframes bgFadeIn {
  to { opacity: 1; }
}

/* ポップアップのアニメーション（スッと出るタイプ） */
.logBox {
  position: relative;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-sizing: border-box;
  max-width: 90vw;
  overflow-y: auto;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  transform: scale(0.9);
  opacity: 0;
  animation: smoothIn 0.25s ease-out forwards;
}

@keyframes smoothIn {
  to { transform: scale(1); opacity: 1; }
}

.log-box-style {
  width: 400px;
  max-height: 70vh;
}

.quiz-box-style {
  width: 580px;
  max-height: 85vh;
}

/* 枠外の✕ボタン */
.outer-close-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: rgba(255, 255, 255, 0.2);
  color: white;
  line-height: 44px;
  text-align: center;
  font-size: 24px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.3s;
  user-select: none;
  z-index: 2100;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.3);
}

.outer-close-btn:hover {
  background: rgba(239, 68, 68, 0.8);
  transform: rotate(90deg);
}

/* クイズ用のスタイル */
.quiz-option {
  display: block;
  width: 100%;
  box-sizing: border-box;
  margin: 10px 0;
  padding: 14px 18px;
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  font-size: 15px;
  color: #333;
}

.quiz-option:hover {
  background: #eef2ff;
  border-color: #6366f1;
  transform: translateX(5px);
}

.quiz-result-title {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.fade-transition {
  animation: simpleFade 0.3s ease forwards;
}

@keyframes simpleFade {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

</style>
</head>
<body>

<div id="home" class="card fade-transition">
  <h1>ZMTQランダム作文</h1>
  <p>「いつ・どこで・誰が・何をした」をランダムに組み合わせて生成します</p>
  <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
    <button onclick="start()">生成する</button>
    <button onclick="openFortune()" style="background:#64748b;">今日の運勢を見る</button>
  </div>
  <button onclick="openQuiz()" style="background:#10b981; margin-top:15px; width:100%;">ZMTQuizに挑戦する</button>
  
  <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
    <div class="log-trigger" onclick="openLog()">ログを確認する</div>
    <div class="log-trigger" onclick="openAchievements()">解除した実績</div>
  </div>
</div>

<div id="loading" class="card hidden">
  <p>生成中…</p>
  <div class="spinner"></div>
</div>

<div id="result" class="card hidden fade-transition">
  <h2>生成結果</h2>
  <div class="note">※クリック / タップでコピーできます</div>
  <div id="text" class="result" onclick="copyText()"></div>
  <div id="rarity" class="rare"></div>
  <button onclick="backHome()">もう一度</button>
</div>

<div id="fortune" class="card hidden fade-transition">
  <h2>ZMTQ占い</h2>
  <div id="fortuneTitle" style="font-size:28px; font-weight:bold;"></div>
  <div id="fortuneMsg" class="note" style="margin-top:10px;"></div>
  <button onclick="backHome()">戻る</button>
</div>

<div id="logModal" class="logModal hidden">
  <div class="outer-close-btn" onclick="closeLog()">✕</div>
  <div class="logBox log-box-style">
    <h3 style="margin-top:0;">観測ログ</h3>
    <div id="logContent" style="font-size:14px; line-height:1.6; text-align:left;"></div>
  </div>
</div>

<div id="achievementsModal" class="logModal hidden">
  <div class="outer-close-btn" onclick="closeAchievements()">✕</div>
  <div class="logBox log-box-style">
    <h3 style="margin-top:0;">実績一覧</h3>
    <div id="achievementsContent" style="font-size:14px; line-height:1.6; text-align:left;"></div>
  </div>
</div>

<div id="quizModal" class="logModal hidden">
  <div class="outer-close-btn" id="quizCloseBtn" onclick="closeQuiz()">✕</div>
  <div class="logBox quiz-box-style" id="quizBox">
    <div id="quizQuestionArea">
      <h3 id="quizTitle" style="margin-top:0; color:#6366f1;"></h3>
      <div id="quizOptions"></div>
    </div>
    <div id="quizTransitionArea" class="hidden fade-transition" style="text-align: center; padding: 30px 0;">
      <h2>お疲れさまでした！</h2>
      <p class="note">結果を集計中…</p>
    </div>
    <div id="quizResultArea" class="hidden fade-transition" style="text-align: center;">
      <div class="quiz-result-title">クイズ結果</div>
      <p style="font-size: 16px; margin: 25px 0;">あなたの正答数は<br><span id="quizScoreDisplay" style="font-size: 32px; color: #10b981; font-weight:bold;"></span> <span style="font-size:18px;">問 / 5問中</span></p>
      <button onclick="closeQuizResult()" style="width:100%;">ホームに戻る</button>
    </div>
  </div>
</div>

<div id="achievement" class="achievement"></div>

<script>
// ===== 実績の全体定義 =====
const ALL_ACHIEVEMENTS = {
  "生成": ["初めて生成した", "10回生成した", "100回生成した"],
  "レアリティ": ["レアを引いた", "スーパーレアを引いた", "ハイパーレアを引いた", "ウルトラレアを引いた"],
  "占い": ["初めて占った", "10回占った", "フブ吉を引いた", "大凶を引いた"],
  "クイズ": ["クイズ全問正解"],
  "特殊・ログ": ["初めてログが記録された", "ログに10回記録された", "僕らだけのハッピーエンド？", "僕らだけのパーリナイ"],
  "コンプリート": ["実績を全て解除した"]
};

// 全実績の数を計算（オブジェクトの中身を平坦化してカウント）
const TOTAL_ACHIEVEMENT_COUNT = Object.values(ALL_ACHIEVEMENTS).flat().length;

// ===== 状態管理 =====
let genCount = 0;
let fortuneCount = 0;
let partyCount = 0; // 追加：楽しげな雰囲気の累計回数
let unlocked = new Set();
let logs = [];

function loadData() {
  const saved = localStorage.getItem('zmtq_save_data');
  if (saved) {
    const data = JSON.parse(saved);
    genCount = data.genCount || 0;
    fortuneCount = data.fortuneCount || 0;
    partyCount = data.partyCount || 0;
    logs = data.logs || [];
    unlocked = new Set(data.unlocked || []);
  }
}

function saveData() {
  const data = {
    genCount,
    fortuneCount,
    partyCount,
    logs,
    unlocked: Array.from(unlocked)
  };
  localStorage.setItem('zmtq_save_data', JSON.stringify(data));
}

window.onload = loadData;

const normal = {
  when: ["今日","さっき","昨日","一週間前","三か月前","一年前","十年前","千年前","だいぶ前","いつか分からんけど"],
  where: ["バネッサで","妖精国で","氷河坑道連邦で","獣の国で","世界樹図書館で","東の国で","華都で","ニライカナイで","吸血鬼城で","魔王領で","教団市国で","蒼い月の裏側で","その辺で"],
  who: ["勇者が","古代勇者が","魔王軍が","魔王軍四天王が","妖精が","魔導士が","騎士が","獣人が","商人が","神官が","壱ノ護王が","弐ノ護王が","參ノ護王が","肆ノ護王が","神王グゴールが","その辺の人が"],
  what: ["魔法の練習をした","ピクニックをした","お昼寝した","パーティーをした","爆発した","転んだ","歌い出した","踊り出した","迷言を言った","お団子を食べた","猛勉強した","記憶を取り戻した","武器を買った","扉をぶち壊した"]
};

const rare = {
  when: ["人類が滅ぶ前"],
  where: ["僕らだけの世界で"],
  who: ["護王全員が"],
  what: ["タイピングで競った"]
};

let rareCount = 0;

function pick(type) {
  if (Math.random() < 0.05) {
    rareCount++;
    return rare[type][0];
  }
  return normal[type][Math.floor(Math.random() * normal[type].length)];
}

function generate() {
  rareCount = 0;
  const current = {
    when: pick("when"),
    where: pick("where"),
    who: pick("who"),
    what: pick("what")
  };
  updateText(current);
  genCount++;

  if (genCount >= 1) unlock("初めて生成した");
  if (genCount >= 10) unlock("10回生成した");
  if (genCount >= 100) unlock("100回生成した");

  if (rareCount === 1) unlock("レアを引いた");
  if (rareCount === 2) unlock("スーパーレアを引いた");
  if (rareCount === 3) unlock("ハイパーレアを引いた");
  if (rareCount >= 4) unlock("ウルトラレアを引いた");

  // 通常ログ
  if (current.when.includes("千年前")) addLog("古き時代を感知");  
  if (current.where.includes("月")) addLog("異常領域：月面反応あり");
  if (current.who.includes("勇者")) addLog("勇者を確認");
  if (current.who.includes("護王")) addLog("種族の長を確認");
  if (current.who.includes("神王グゴール")) addLog("神？を確認");
  if (current.what.includes("爆発")) addLog("爆発を検知");
  if (current.what.includes("お団子")) addLog("お団子摂取済み");
  if (current.what.includes("記憶")) addLog("記憶の断片を検知");
  if (current.what.includes("扉をぶち壊した")) addLog("扉の破片を検知");
  
  // パーティ系の処理
  if (current.what.includes("パーティーをした") || current.what.includes("歌い出した") || current.what.includes("踊り出した")) {
    addLog("楽しげな雰囲気を感知");
    partyCount++;
    if (partyCount >= 10) unlock("僕らだけのパーリナイ");
  }

  // 複合条件のログ＆実績
  if (current.when.includes("千年前") && current.who.includes("古代勇者")) {
    addLog("伝説の旅を検出");
  }
  if (current.who.includes("神王グゴール") && current.what.includes("爆発した")) {
    addLog("神王爆破により物語終了");
    unlock("僕らだけのハッピーエンド？");
  }
  if (current.who.includes("參ノ護王") && current.what.includes("お団子を食べた")) {
    addLog("魔王の主食を検出");
  }

  saveData();
}

function updateText(current) {
  const text = `${current.when}、${current.where}${current.who}${current.what}`;
  document.getElementById("text").innerText = text;
  const r = document.getElementById("rarity");
  r.className = "rare";
  if (rareCount === 1) { r.innerText = "レア！"; r.classList.add("rare1"); }
  else if (rareCount === 2) { r.innerText = "スーパーレア！"; r.classList.add("super"); }
  else if (rareCount === 3) { r.innerText = "ハイパーレア！"; r.classList.add("hyper"); }
  else if (rareCount >= 4) { r.innerText = "ウルトラレア！！"; r.classList.add("ultra"); }
  else { r.innerText = ""; }
}

function start() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");
  setTimeout(() => {
    generate();
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
  }, 1500);
}

function copyText() {
  const text = document.getElementById("text").innerText;
  navigator.clipboard.writeText(text);
  alert("コピーしたよ！");
}

const fortunes = {
  daikichi: { name: "大吉", class: "daikichi", msgs: ["理由は特にない", "魔法に目覚めるかも？", "今宵は星が綺麗でしょう"] },
  chukichi: { name: "中吉", class: "chukichi", msgs: ["空が青いから", "海が続いているから", "光魔法を浴びたい"] },
  shokichi: { name: "小吉", class: "shokichi", msgs: ["言いたいことは言おう", "おいしいご飯を食べよう", "たくさん寝よう"] },
  kyo: { name: "凶", class: "kyo", msgs: ["そんな日もあるさ", "魔防を高くしていこう", "ここから上がるしかない"] }
};

const specialFortune = [
  { name: "フブ吉", msg: "魔力の高い一日になるでしょう" },
  { name: "大凶", msg: "魔王軍の襲来に注意！" }
];

function openFortune() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("fortune").classList.remove("hidden");
  const title = document.getElementById("fortuneTitle");
  const msg = document.getElementById("fortuneMsg");
  title.className = "";

  if (Math.random() < 0.05) {
    const sp = specialFortune[Math.floor(Math.random() * specialFortune.length)];
    title.innerText = sp.name;
    msg.innerText = sp.msg;
    title.classList.add("special");
    if (sp.name === "フブ吉") unlock("フブ吉を引いた");
    if (sp.name === "大凶") unlock("大凶を引いた");
  } else {
    const keys = Object.keys(fortunes);
    const f = fortunes[keys[Math.floor(Math.random() * keys.length)]];
    title.innerText = f.name;
    msg.innerText = f.msgs[Math.floor(Math.random() * f.msgs.length)];
    title.classList.add(f.class);
  }

  fortuneCount++;
  if (fortuneCount >= 1) unlock("初めて占った");
  if (fortuneCount >= 10) unlock("10回占った");
  saveData();
}

function backHome() {
  document.getElementById("fortune").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

// ===== 実績解除の共通処理 =====
function unlock(name) {
  if (unlocked.has(name)) return;
  unlocked.add(name);
  
  const el = document.getElementById("achievement");
  el.innerText = `🏆 実績解除：${name}`;
  el.classList.add("show");
  
  setTimeout(() => { el.classList.remove("show"); }, 2000);
  saveData();

  // 「コンプリート実績」以外の実績が全て解除されたかを判定
  if (name !== "実績を全て解除した") {
    // 自身(コンプリート)を除いた総数と同じなら、全て集まったとみなす
    if (unlocked.size === TOTAL_ACHIEVEMENT_COUNT - 1) {
      setTimeout(() => {
        unlock("実績を全て解除した");
      }, 2500); // 前のポップアップが消えた直後に表示
    }
  }
}

// ===== ログ・実績表示 =====
function addLog(text) {
  logs.push(text);
  if (logs.length === 1) unlock("初めてログが記録された");
  if (logs.length === 10) unlock("ログに10回記録された");
  saveData();
}

function openLog() {
  const modal = document.getElementById("logModal");
  const box = document.getElementById("logContent");
  box.innerHTML = logs.length ? logs.map(l => `<div style="border-bottom:1px dashed #e2e8f0; padding:8px 0;">・${l}</div>`).join("") : "ログはまだ記録されていません";
  modal.classList.remove("hidden");
}

function closeLog() {
  document.getElementById("logModal").classList.add("hidden");
}

function openAchievements() {
  const modal = document.getElementById("achievementsModal");
  const box = document.getElementById("achievementsContent");
  
  let html = "";
  
  // 達成率の計算
  const progressPercent = Math.floor((unlocked.size / TOTAL_ACHIEVEMENT_COUNT) * 100);
  html += `<div style="text-align:center; font-size:16px; font-weight:bold; color:#10b981; margin-bottom:15px;">達成率: ${progressPercent}% (${unlocked.size} / ${TOTAL_ACHIEVEMENT_COUNT})</div>`;

  // カテゴリごとに実績を描画
  for (const [category, achList] of Object.entries(ALL_ACHIEVEMENTS)) {
    html += `<h4 style="margin: 15px 0 5px 0; color: #6366f1; border-bottom: 2px solid #e2e8f0; padding-bottom: 3px;">【${category}】</h4>`;
    
    achList.forEach(ach => {
      if (unlocked.has(ach)) {
        html += `<div style="padding: 5px 0; color: #333; font-weight:bold;">🏆 ${ach}</div>`;
      } else {
        html += `<div style="padding: 5px 0; color: #94a3b8;">🔒 ？？？</div>`;
      }
    });
  }

  box.innerHTML = html;
  modal.classList.remove("hidden");
}

function closeAchievements() {
  document.getElementById("achievementsModal").classList.add("hidden");
}

// ===== ZMTQuiz =====
const quizData = [
  { q: "問1　カンボジア？", opts: ["A. カリフラワー！", "B. ブロッコリー！", "C. トメイトォ！", "D. エッグプラント！"], ans: 1 },
  { q: "問2　ムチグラ？", opts: ["A. バルーン！", "B. アミーゴォ！", "C. メキシコォ！", "D. カルパッチョ！"], ans: 1 },
  { q: "問3　僕は？", opts: ["A. ファンクション！", "B. ミュージック！", "C. ポテイトォ！", "D. ムエタイ！"], ans: 3 },
  { q: "問4　セミをみんなで？", opts: ["A. つつこう！", "B. よけよう！", "C. うめよう！", "D. さがそう！"], ans: 0 },
  { q: "問5　ZMTQの正式名称は？", opts: ["A. ZERO MOTIVATION TO QUIT", "B. ZONE OF MAXIMUM TEATIME QUIET", "C. ZETTAI MAJIDE TOTEMO QUEEN", "D. ZETA MYTH TREE QUEST"], ans: 3 }
];

let currentQuizIndex = 0;
let currentScore = 0;

function openQuiz() {
  currentQuizIndex = 0;
  currentScore = 0;
  document.getElementById("quizQuestionArea").classList.remove("hidden");
  document.getElementById("quizTransitionArea").classList.add("hidden");
  document.getElementById("quizResultArea").classList.add("hidden");
  document.getElementById("quizCloseBtn").classList.remove("hidden");
  renderQuestion();
  document.getElementById("quizModal").classList.remove("hidden");
}

function renderQuestion() {
  const data = quizData[currentQuizIndex];
  const title = document.getElementById("quizTitle");
  const optionsBox = document.getElementById("quizOptions");
  
  title.classList.remove("fade-transition");
  optionsBox.classList.remove("fade-transition");
  void title.offsetWidth; 
  title.classList.add("fade-transition");
  optionsBox.classList.add("fade-transition");

  title.innerText = data.q;
  optionsBox.innerHTML = "";

  data.opts.forEach((optText, index) => {
    const btn = document.createElement("div");
    btn.className = "quiz-option";
    btn.innerText = optText;
    btn.onclick = () => handleAnswer(index);
    optionsBox.appendChild(btn);
  });
}

function handleAnswer(selectedIndex) {
  const correctIndex = quizData[currentQuizIndex].ans;
  if (selectedIndex === correctIndex) {
    currentScore++;
  }
  currentQuizIndex++;
  if (currentQuizIndex < quizData.length) {
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  document.getElementById("quizQuestionArea").classList.add("hidden");
  const transArea = document.getElementById("quizTransitionArea");
  transArea.classList.remove("hidden");
  document.getElementById("quizCloseBtn").classList.add("hidden");

  setTimeout(() => {
    transArea.classList.add("hidden");
    document.getElementById("quizScoreDisplay").innerText = currentScore;
    document.getElementById("quizResultArea").classList.remove("hidden");
    if(currentScore === 5) unlock("クイズ全問正解");
  }, 1500);
}

function closeQuiz() {
  document.getElementById("quizModal").classList.add("hidden");
}

function closeQuizResult() {
  document.getElementById("quizModal").classList.add("hidden");
}
</script>
</body>
</html>
